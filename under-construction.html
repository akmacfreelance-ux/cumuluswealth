<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — Cumulus Wealth</title>
  <link rel="icon" href="./images/fav-icon.png" />

  <style>
    @font-face {
      font-family: 'Moulin Regular';
      src: url('./Fonts/Moulin_Family/Moulin-Regular-Trial.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Quicksand';
      src: url('./fonts/Quicksand/Quicksand-Light.ttf') format('truetype');
      font-weight: 300;
    }
    @font-face {
      font-family: 'Quicksand';
      src: url('./fonts/Quicksand/Quicksand-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Quicksand';
      src: url('./fonts/Quicksand/Quicksand-Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'Quicksand';
      src: url('./fonts/Quicksand/Quicksand-SemiBold.ttf') format('truetype');
      font-weight: 600;
    }

    :root {
      --navy:       #0e1c2e;
      --teal:       #2d6e82;
      --teal-light: #4fc3e8;
      --white:      #ffffff;
      --slate:      #8caabb;
      --slate-lt:   #b8cdd9;
      --light-navy: #01395E;
      --ff-display: 'Moulin Regular', serif;
      --ff-ui:      'Quicksand', sans-serif;
      --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--ff-ui);
      font-weight: 300;
      background: var(--navy);
      color: var(--white);
    }

    /* ── FULL PAGE WRAPPER ── */
    .uc-page {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Background */
    .uc-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      animation: bgFade 1.6s var(--ease-out) 0.1s forwards;
    }

    @keyframes bgFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .uc-bg-fallback {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(45,110,130,0.3) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 75% 20%, rgba(30,60,90,0.35) 0%, transparent 55%),
        linear-gradient(170deg, #1a2f46 0%, #1e3449 40%, #152234 70%, #0e1c2e 100%);
      z-index: 0;
    }

    /* Animated wave lines — decorative, spans full width */
    .uc-waves {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      animation: wavesFade 1.4s var(--ease-out) 1s forwards;
    }

    @keyframes wavesFade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .uc-wave-path {
      animation: waveDrift 18s ease-in-out infinite;
      fill: none;
    }
    .uc-wave-path:nth-child(2) { animation-duration: 22s; animation-delay: -4s; }
    .uc-wave-path:nth-child(3) { animation-duration: 16s; animation-delay: -8s; }
    .uc-wave-path:nth-child(4) { animation-duration: 20s; animation-delay: -12s; }
    .uc-wave-path:nth-child(5) { animation-duration: 24s; animation-delay: -6s; }
    .uc-wave-path:nth-child(6) { animation-duration: 19s; animation-delay: -10s; }

    @keyframes waveDrift {
      0%, 100% { transform: translateX(0) translateY(0); }
      33%       { transform: translateX(-14px) translateY(5px); }
      66%       { transform: translateX(10px) translateY(-4px); }
    }

    /* ── LOGO ── */
    .uc-logo {
      position: absolute;
      top: 32px;
      left: 40px;
      z-index: 10;
      opacity: 0;
      animation: fadeUp 1s var(--ease-out) 1.4s forwards;
    }

    .uc-logo img {
      height: 42px;
      width: auto;
    }

    /* Fallback text logo if image missing */
    .uc-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .uc-logo-name {
      font-family: var(--ff-display);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--white);
    }

    .uc-logo-sub {
      font-family: var(--ff-ui);
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.35em;
      color: var(--slate-lt);
      margin-top: 3px;
    }

    /* ── MAIN CONTENT ── */
    .uc-content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 0 24px;
    }

    /* Label */
    .uc-label {
      font-family: var(--ff-ui);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.38em;
      color: var(--slate-lt);
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1s var(--ease-out) 1.6s forwards;
    }

    /* Main heading */
    .uc-heading {
      font-family: var(--ff-display);
      font-size: clamp(42px, 7vw, 88px);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: 0.03em;
      color: var(--white);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1.1s var(--ease-out) 1.8s forwards;
    }

    .uc-heading em {
      font-style: italic;
      font-weight: 300;
      color: var(--slate-lt);
    }

    /* Divider line */
    .uc-divider {
      width: 48px;
      height: 1px;
      background: rgba(79,195,232,0.5);
      margin: 0 auto 28px;
      opacity: 0;
      animation: fadeUp 1s var(--ease-out) 2s forwards;
    }

    /* Subtitle */
    .uc-sub {
      font-family: var(--ff-ui);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--slate-lt);
      line-height: 1.75;
      max-width: 360px;
      margin: 0 auto 44px;
      opacity: 0;
      animation: fadeUp 1s var(--ease-out) 2.1s forwards;
    }

    /* Back home link */
    .uc-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--ff-ui);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid rgba(79,195,232,0.4);
      padding-bottom: 4px;
      transition: border-color 0.3s, opacity 0.3s;
      opacity: 0;
      animation: fadeUp 1s var(--ease-out) 2.3s forwards;
    }

    .uc-link:hover {
      border-color: var(--teal-light);
      opacity: 0.75;
      color: var(--white);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM BAR ── */
    .uc-footer {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      opacity: 0;
      animation: fadeUp 1s var(--ease-out) 2.5s forwards;
    }

    .uc-footer-text {
      font-family: var(--ff-ui);
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .uc-footer-reg {
      font-family: var(--ff-ui);
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .uc-logo { left: 20px; top: 24px; }
      .uc-footer { padding: 0 20px; }
      .uc-heading { font-size: clamp(36px, 11vw, 60px); }
    }

    @media (max-width: 480px) {
      .uc-footer { flex-direction: column; gap: 6px; align-items: center; text-align: center; }
      .uc-sub { font-size: 12px; }
    }
  </style>
</head>

<body>

<div class="uc-page">

  <div class="uc-bg-fallback"></div>
  <img src="./images/UC-bg.jpg" class="uc-bg" alt=""
       onerror="this.style.display='none'">

  <svg class="uc-waves" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

    <path class="uc-wave-path" d="M -100 500 Q 180 460 480 498 Q 780 536 1080 480 Q 1300 452 1540 496" stroke="rgba(45,110,130,0.2)" stroke-width="1.4"/>
    <path class="uc-wave-path" d="M -100 540 Q 240 496 540 538 Q 840 580 1140 520 Q 1340 492 1540 536" stroke="rgba(45,110,130,0.12)" stroke-width="0.8"/>
    <path class="uc-wave-path" d="M -100 380 Q 160 344 460 378 Q 760 412 1060 360 Q 1280 333 1540 372" stroke="rgba(79,195,232,0.08)" stroke-width="1"/>
    <path class="uc-wave-path" d="M -100 580 Q 200 536 500 575 Q 800 614 1100 558 Q 1320 528 1540 570" stroke="rgba(45,110,130,0.1)" stroke-width="0.8"/>

  <!-- Logo -->
  <div class="uc-logo">
    <img src="./images/Cumulus-main-Logo.png" alt="Cumulus Wealth"
         onerror="this.style.display='none'; document.querySelector('.uc-logo-text').style.display='flex'">

      <span class="uc-logo-name">Cumulus</span>
      <span class="uc-logo-sub">Wealth</span>
    </div> -->
  </div>

  <!-- Main content -->
  <div class="uc-content">
    <p class="uc-label">Cumulus Wealth</p>

    <h1 class="uc-heading">
      Coming<br><em>Soon</em>
    </h1>

    <div class="uc-divider"></div>

    <p class="uc-sub">

    </p>

    <a href="./index.html" class="uc-link">
      ← Return Home
    </a>
  </div>

  <!-- Bottom bar -->
  <!-- <div class="uc-footer">
    <span class="uc-footer-text">Cumulus Advisory LLP</span>
    <span class="uc-footer-reg">SEBI Registration Number: INP000009214</span>
  </div> -->

</div>

</body>
</html>
